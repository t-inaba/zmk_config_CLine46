#Battery config -------------------
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=7200000

##for NiMH battery
CONFIG_ZMK_NON_LIPO_BATTERY_MANAGEMENT=y

# optional
CONFIG_ZMK_NON_LIPO_MAX_MV=1360
CONFIG_ZMK_NON_LIPO_MIN_MV=1020
CONFIG_ZMK_NON_LIPO_LOW_MV=1000
#CONFIG_ZMK_NON_LIPO_ADV_SLEEP_TIMEOUT=60000
# 60 seconds


## ========================================
## DYA Studio 用の設定（Peripheral 側）
## ========================================
## バッテリー履歴（Peripheral 側）
#CONFIG_ZMK_BATTERY_HISTORY=n
#
## Settings RPC（Peripheral 側）
#CONFIG_ZMK_SETTINGS_RPC=y
#
## Split イベントリレー（Peripheral 側）
#CONFIG_ZMK_SPLIT_RELAY_EVENT=y
#
## 設定の永続化
#CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=10000

# battery level percentage
CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=50
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=20

# ヒープメモリの拡張
CONFIG_HEAP_MEM_POOL_SIZE=24576

# Bluetooth (Zephyr BLE stack) Memory / Buffer Tuning
CONFIG_BT_RX_STACK_SIZE=2560
CONFIG_BT_HCI_TX_STACK_SIZE_WITH_PROMPT=y
CONFIG_BT_HCI_TX_STACK_SIZE=1536

CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_CTLR_PHY_2M=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
#CONFIG_BT_CTLR_TX_PWR_PLUS_12=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=y

CONFIG_ZMK_SLEEP=n
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=24
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=600